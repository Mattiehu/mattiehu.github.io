<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Study - Investigation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=EB+Garamond:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', serif;
      overflow: hidden;
      color: #e2d9c8;
    }

    /* 背景图：不加暗化滤镜 */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('Studyroom.jpg');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* 胶片颗粒感 */
    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* 返回按钮 */
    .back-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 10;
      text-decoration: none;
      color: #ffffff;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.4);
      padding: 8px 15px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .back-nav:hover {
      background: #c9a84c;
      color: #000;
      border-color: #c9a84c;
    }

    /* 打字机标题容器 */
    .title-container {
      position: relative;
      z-index: 2;
      margin-bottom: 80px;
      height: 60px; /* 固定高度防止抖动 */
    }

    #typewriter {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 4vw, 2.2rem);
      font-style: italic;
      text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
      text-align: center;
    }

    /* 按钮容器布局 */
    .button-wrapper {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 40px;
      width: 80%;
      max-width: 900px;
      justify-content: center;
    }

    .choice-card {
      flex: 1;
      padding: 25px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(201, 168, 76, 0.3);
      backdrop-filter: blur(5px);
      text-align: center;
      text-decoration: none;
      color: #e2d9c8;
      font-family: 'EB Garamond', serif;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 1rem;
      transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
    }

    .choice-card:hover {
      background: rgba(201, 168, 76, 0.2);
      border-color: #c9a84c;
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      color: #fff;
    }

    /* 打字机光标效果 */
    .cursor {
      display: inline-block;
      width: 3px;
      background-color: #c9a84c;
      margin-left: 5px;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <a href="Storystartpage.html" class="back-nav">← Back to the Beginning</a >

  <div class="title-container">
    <h1 id="typewriter"></h1><span class="cursor"></span>
  </div>

  <div class="button-wrapper">
    <a href="check_fingerprint.html" class="choice-card">Check the fingerprint</a >
    <a href="check_bottle.html" class="choice-card">Check the glass bottle on the table</a >
  </div>

  <script>
    const text = "Something catches your eyes while you in the Study...";
    let index = 0;
    const speed = 70; // 打字速度（毫秒）

    function typeWriter() {
      if (index < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, speed);
      }
    }

    // 页面加载完后开始打字
    window.onload = typeWriter;
  </script>

</body>
</html>
