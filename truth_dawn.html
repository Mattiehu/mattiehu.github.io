<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Completed - The Truth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=EB+Garamond:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', serif;
      overflow: hidden;
      color: #e2d9c8;
    }

    /* 背景图：不加暗化处理 */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('Truth.jpg');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* 维持统一的微弱胶片颗粒感 */
    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* 左上角返回键，指向指纹页面 */
    .back-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 10;
      text-decoration: none;
      color: #ffffff;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.4);
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .back-nav:hover {
      background: #c9a84c;
      color: #000;
      border-color: #c9a84c;
    }

    /* 成功文本区域 */
    .text-container {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(0, 0, 0, 0.35); /* 较薄的遮罩，因为阳光背景很美 */
      backdrop-filter: blur(4px);
      padding: 50px;
      max-width: 800px;
    }

    #completed-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 8vw, 3.8rem);
      font-weight: 700;
      color: #c9a84c; /* 金色象征真相与胜利 */
      letter-spacing: 0.25em;
      margin-bottom: 25px;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    #completed-sub {
      font-size: 1.4rem;
      color: #ffffff;
      line-height: 1.6;
      text-shadow: 1px 1px 10px rgba(0,0,0,1);
    }

    /* 底部导航选择 */
    .bottom-controls {
      position: fixed;
      bottom: 60px;
      z-index: 2;
      display: flex;
      gap: 60px;
    }

    .nav-option {
      text-decoration: none;
      color: #b5a896;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 10px;
      border-bottom: 1px solid transparent;
      transition: all 0.4s ease;
    }

    .nav-option:hover {
      color: #fff;
      border-bottom: 1px solid #c9a84c;
      text-shadow: 0 0 10px rgba(201, 168, 76, 0.8);
    }

    .cursor {
      display: inline-block;
      width: 3px;
      background-color: #c9a84c;
      margin-left: 10px;
      animation: blink 0.7s infinite;
      vertical-align: middle;
    }

    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <a href="check_fingerprint.html" class="back-nav">← Back</a >

  <div class="text-container">
    <h1 id="completed-title"></h1>
    <p id="completed-sub"></p ><span class="cursor" id="cursor"></span>
  </div>

  <div class="bottom-controls">
    <a href="index.html" class="nav-option">Exit Game</a >
    <a href="Interactivestory.html" class="nav-option">Restart</a >
  </div>

  <script>
    const titleText = "MISSION COMPLETED";
    const subText = "Faced with the evidence stacked against him, Mr. Marsh finally confessed to his crimes. A long night passed. Dawn finally broke.";
    
    let i = 0;
    let j = 0;
    const speed = 70;

    function typeWriter() {
      if (i < titleText.length) {
        document.getElementById("completed-title").innerHTML += titleText.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      } else if (j < subText.length) {
        document.getElementById("completed-sub").innerHTML += subText.charAt(j);
        j++;
        setTimeout(typeWriter, speed / 1.5);
      } else {
        // 完成后隐藏光标
        document.getElementById("cursor").style.display = "none";
      }
    }

    window.onload = typeWriter;
  </script>

</body>
</html>
