<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Evidence - Fingerprint</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=EB+Garamond:wght@400;500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', serif;
      overflow: hidden;
      color: #e2d9c8;
    }

    /* 背景图：带有轻微暗化处理 */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('fingerprint.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.7); /* 轻微暗化 */
      z-index: 0;
    }

    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* 左上角返回键 */
    .back-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 10;
      text-decoration: none;
      color: #ffffff;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }
    .back-nav:hover {
      background: #c9a84c;
      color: #000;
      border-color: #c9a84c;
    }

    /* 标题容器 */
    .title-container {
      position: relative;
      z-index: 2;
      text-align: center;
      margin-bottom: 80px;
      min-height: 50px;
    }

    #typewriter {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5vw, 2.5rem);
      font-style: italic;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(0,0,0,1);
    }

    /* 指控按钮 */
    .btn-container {
      position: relative;
      z-index: 2;
    }

    .accuse-btn {
      display: inline-block;
      padding: 20px 50px;
      background: rgba(139, 0, 0, 0.2); /* 淡淡的暗红色暗示危险 */
      border: 1px solid #c9a84c;
      color: #c9a84c;
      text-decoration: none;
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      transition: all 0.4s ease;
      backdrop-filter: blur(5px);
    }

    .accuse-btn:hover {
      background: #c9a84c;
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
    }

    /* 光标 */
    .cursor {
      display: inline-block;
      width: 3px;
      background-color: #c9a84c;
      margin-left: 8px;
      animation: blink 0.7s infinite;
      vertical-align: middle;
    }

    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <a href="Searchthestudy.html" class="back-nav">← Back </a >

  <div class="title-container">
    <h1 id="typewriter"></h1><span class="cursor"></span>
  </div>

  <div class="btn-container">
    <a href="truth_dawn.html" class="accuse-btn">Accuse Mr. Marsh? (The Butler)</a >
  </div>

  <script>
    const text = "The fingerprint points to the Butler.";
    let index = 0;
    const speed = 80;

    function typeWriter() {
      if (index < text.length) {
        document.getElementById("typewriter").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeWriter, speed);
      }
    }

    window.onload = typeWriter;
  </script>

</body>
</html>
