<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WHO'S THE ACTUAL KILLER IN THE VILLA!?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #07070e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', Georgia, serif;
      overflow: hidden;
    }

    /* Background image */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('villa-mystery-final/images/start.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) sepia(0.3);
      z-index: 0;
    }

    /* Fallback gradient if no image */
    .bg-fallback {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, #1a1228 0%, #07070e 70%);
      z-index: 0;
    }

    /* Grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* Center card */
    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      animation: appear 2s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.82rem;
      letter-spacing: 0.25em;
      color: #8a7a60;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 3rem);
      font-weight: 700;
      color: #e2d9c8;
      line-height: 1.2;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    h1 .gold { color: #c9a84c; }

    .rule {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 24px auto;
    }

    .tagline {
      font-size: 1rem;
      font-style: italic;
      color: #7a7060;
      letter-spacing: 0.06em;
      margin-bottom: 44px;
      line-height: 1.7;
    }

    /* Start button */
    .start-btn {
      display: inline-block;
      padding: 16px 48px;
      border: 1px solid rgba(201,168,76,0.5);
      color: #c9a84c;
      text-decoration: none;
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(201,168,76,0.08);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .start-btn:hover {
      border-color: #c9a84c;
      color: #e8d08a;
    }
    .start-btn:hover::before { opacity: 1; }

    .start-btn .arr {
      margin-left: 10px;
      opacity: 0.6;
      transition: transform 0.3s, opacity 0.3s;
      display: inline-block;
    }
    .start-btn:hover .arr { transform: translateX(4px); opacity: 1; }

    /* Back to portfolio link */
    .back {
      position: fixed;
      top: 24px; left: 28px;
      z-index: 10;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 0.82rem;
      color: #5a5060;
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.3s;
    }
    .back:hover { color: #c9a84c; }
  </style>
</head>
<body>

  <div class="bg-fallback"></div>
  <div class="bg"></div>
  <div class="grain"></div>

  <a class="back" href="index.html">← Back to homepage</a >

  <div class="card">
    <div class="eyebrow">Mystery Story</div>
    <h1>"WHO'S THE ACTUAL<br><span class="gold">KILLER IN THE VILLA!?"</span></h1>
    <div class="rule"></div>
    <p class="tagline">
      A blizzard. A dead host. Four suspects.<br>
      Dawn is six hours away.
    </p >
    <a class="start-btn" href="Storystartpage.html">
      Begin <span class="arr">→</span>
    </a >
  </div>

</body>
</html>
