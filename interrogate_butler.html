<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interrogating the Butler</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=EB+Garamond:wght@400;500;600&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'EB Garamond', serif;
      overflow: hidden;
      color: #e2d9c8;
    }

    /* 背景图：不加暗化处理 */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('butler.jpg'); /* 如果确定用这图，请确保文件名正确 */
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* 左上角返回键 */
    .back-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 10;
      text-decoration: none;
      color: #ffffff;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s;
    }
    .back-nav:hover {
      background: #c9a84c;
      color: #000;
      border-color: #c9a84c;
    }

    /* 对话框容器 */
    .dialogue-box {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 850px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      padding: 40px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      text-align: center;
    }

    .speech-text {
      font-size: 1.35rem;
      line-height: 1.6;
      margin-bottom: 20px;
      min-height: 60px;
    }

    .butler-name {
      color: #c9a84c;
      font-weight: 600;
      margin-right: 10px;
    }

    .dots {
      font-size: 1.5rem;
      letter-spacing: 5px;
      margin: 15px 0;
      color: #8a7a60;
      display: block;
    }

    .detective-text {
      font-style: italic;
      color: #b5a896;
      font-size: 1.15rem;
      margin-bottom: 35px;
      display: block;
    }

    /* 揭穿按钮 */
    .expose-btn {
      display: inline-block;
      padding: 20px 40px;
      background: rgba(201, 168, 76, 0.1);
      border: 1px solid #c9a84c;
      color: #c9a84c;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.95rem;
      transition: all 0.4s ease;
      opacity: 0; /* 初始隐藏，等打字结束后显示 */
    }

    .expose-btn.visible {
      opacity: 1;
    }

    .expose-btn:hover {
      background: #c9a84c;
      color: #000;
      box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background-color: #c9a84c;
      margin-left: 5px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="grain"></div>

  <a href="Questionthepeople.html" class="back-nav">← Back</a >

  <div class="dialogue-box">
    <div class="speech-text" id="content"></div>
    <a href="confession.html" class="expose-btn" id="btn">There's a hole in the butler's alibi, expose him now？</a >
  </div>

  <script>
    const butlerLine = "Mr. Marsh: \"I was in the kitchen all evening, sir. I never entered the study. I only brought the wine to the door, but the master said he wasn't thirsty and told me to leave it outside...\"";
    const dots = "\n\n...........\n\n";
    const detectiveLine = "Detective(You): (Wait... If he never entered the study, how did his fingerprint get on the window latch? And why was the wine bottle already half-empty on the desk?)";

    const fullText = butlerLine + dots + detectiveLine;
    let i = 0;
    const speed = 40; // 打字速度

    function typeWriter() {
      if (i < fullText.length) {
        let char = fullText.charAt(i);
        // 处理换行符
        document.getElementById("content").innerHTML += char === "\n" ? "<br>" : char;
        i++;
        setTimeout(typeWriter, speed);
      } else {
        // 打字结束，显示按钮
        document.getElementById("btn").classList.add("visible");
      }
    }

    window.onload = typeWriter;
  </script>

</body>
</html>
